<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100" color="#000">
  <defs>
    <style>
      .l { stroke: currentColor; stroke-width: 1.2; opacity: .42; }
      @media (prefers-color-scheme: dark) { svg { color: #EDEBE7; } }
      .s { stroke: none; }
    </style>
  </defs>
  <!-- network mark -->
  <g transform="translate(8, 12)">
    <line class="l" x1="38" y1="38" x2="13" y2="17.5"/>
    <line class="l" x1="38" y1="38" x2="63" y2="17.5"/>
    <line class="l" x1="38" y1="38" x2="11" y2="61"/>
    <line class="l" x1="38" y1="38" x2="65" y2="61"/>
    <circle class="s" cx="13" cy="17.5" r="4.5" fill="#22D3EE"/>
    <circle class="s" cx="63" cy="17.5" r="4.5" fill="#1E6FFF"/>
    <circle class="s" cx="11" cy="61" r="4.5" fill="currentColor"/>
    <circle class="s" cx="65" cy="61" r="4.5" fill="#22D3EE"/>
    <circle class="s" cx="38" cy="38" r="6.5" fill="#1E6FFF"/>
  </g>
  <!-- wordmark -->
  <g transform="translate(88, 12)">
    <text x="0" y="36" font-family="'Anton','Arial Narrow',Arial,sans-serif" font-size="44" font-weight="400" fill="currentColor" letter-spacing=".01em">Net Leads</text>
    <text x="0" y="60" font-family="'Archivo','Arial Narrow',Arial,sans-serif" font-size="14" font-weight="700" fill="#22D3EE" letter-spacing=".28em" text-transform="uppercase">Rank Higher. Get More Leads.</text>
  </g>
</svg>